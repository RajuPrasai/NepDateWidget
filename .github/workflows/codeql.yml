name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly scan, Monday 06:00 UTC. Catches advisories published mid-week.
    - cron: "0 6 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (csharp)
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp
          # security-extended catches more low-severity issues than the
          # default suite; for a small WPF app the noise is manageable.
          queries: security-extended

      - name: Build
        run: dotnet build src/NepDateWidget/NepDateWidget.csproj -c Release

      - name: Perform analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:csharp"
